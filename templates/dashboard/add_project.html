{% extends 'dashboard/base.html' %}
{% block title %}Tambah Proyek{% endblock %}

{% block content %}
<div class="dash-header">
  <h1>Tambah Proyek Baru</h1>
  <a href="{{ url_for('dashboard_projects') }}" class="view-site-link">← kembali ke daftar proyek</a>
</div>

<div class="panel-box" style="max-width: 640px;">
  <form method="POST" action="{{ url_for('add_project') }}" enctype="multipart/form-data">
    <div class="form-group">
      <label for="title">Judul Proyek</label>
      <input class="form-control" type="text" id="title" name="title" value="{{ form.get('title', '') }}" required>
    </div>
    <div class="form-group">
      <label for="description">Deskripsi</label>
      <textarea class="form-control" id="description" name="description" required>{{ form.get('description', '') }}</textarea>
    </div>
    <div class="form-group">
      <label for="technologies">Teknologi (pisahkan dengan koma)</label>
      <input class="form-control" type="text" id="technologies" name="technologies" placeholder="Flask, SQLite, Bootstrap" value="{{ form.get('technologies', '') }}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="github_link">Link GitHub</label>
        <input class="form-control" type="url" id="github_link" name="github_link" placeholder="https://github.com/..." value="{{ form.get('github_link', '') }}">
      </div>
      <div class="form-group">
        <label for="live_link">Link website</label>
        <input class="form-control" type="url" id="live_link" name="live_link" placeholder="https://..." value="{{ form.get('live_link', '') }}">
      </div>
    </div>
    <div class="form-group">
      <label for="image">Gambar Proyek</label>
      <input class="form-control" type="file" id="image" name="image" accept=".png,.jpg,.jpeg,.gif,.webp">
      <div class="form-hint">Format: PNG, JPG, JPEG, GIF, WEBP. Maksimal 5 MB.</div>
    </div>
    <button type="submit" class="btn btn-primary">Simpan Proyek →</button>
  </form>
</div>
{% endblock %}
